<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RASPNET Receiver Log Verifier</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #151922;
      --muted: #5c6575;
      --line: #d8dde6;
      --good: #126b3a;
      --bad: #a32b2b;
      --warn: #8a5a00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 700;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    label {
      display: grid;
      gap: 5px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 420px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      background: #1e5b9a;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .results {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .check {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
    }

    .pass {
      border-color: #9dd5b1;
      color: var(--good);
    }

    .fail {
      border-color: #e1a2a2;
      color: var(--bad);
    }

    .warn {
      border-color: #e4c06f;
      color: var(--warn);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 12px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 7px 6px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    @media (max-width: 800px) {
      main {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>RASPNET Receiver Log Verifier</h1>
    <div class="grid">
      <section>
        <h2>Expected Output</h2>
        <label>
          Node under test address, hex
          <input id="ownAddress" value="59">
        </label>
        <label>
          Sender source address, hex
          <input id="senderSource" value="58">
        </label>
        <label>
          Sender destination address, hex
          <input id="senderDestination" value="00">
        </label>
        <label>
          Expected relayed frames
          <input id="expectedRelays" type="number" min="0" value="12">
        </label>
        <label>
          Expected own frames
          <input id="expectedOwn" type="number" min="0" value="2">
        </label>
        <label>
          Expected bad-CRC relays
          <input id="expectedBadCrcRelays" type="number" min="0" value="0">
        </label>
        <button id="verify">Verify Log</button>
        <div id="results" class="results"></div>
      </section>

      <section>
        <h2>Receiver UART Log</h2>
        <textarea id="log" spellcheck="false" placeholder='Paste lines like:
FRAME crc=12345678 calc=12345678 ok=1 size=09 dst=60 src=58 payload=72656C61792D31 ascii="relay-1"'></textarea>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Kind</th>
              <th>CRC</th>
              <th>Dst</th>
              <th>Src</th>
              <th>Payload</th>
            </tr>
          </thead>
          <tbody id="frames"></tbody>
        </table>
      </section>
    </div>
  </main>

  <script>
    const senderPlan = [
      { kind: "relay", ascii: "alpha-8391", ok: true },
      { kind: "relay", ascii: "bravo-2047", ok: true },
      { kind: "relay", ascii: "charlie-7715", ok: true },
      { kind: "relay", ascii: "delta-4920", ok: true },
      { kind: "relay-trigger", ascii: "Send", ok: true },
      { kind: "relay", ascii: "echo-1186", ok: true },
      { kind: "relay", ascii: "foxtrot-6503", ok: true },
      { kind: "relay-trigger", ascii: "Send", ok: true },
      { kind: "relay", ascii: "golf-3258", ok: true },
      { kind: "relay", ascii: "hotel-9064", ok: true },
      { kind: "relay", ascii: "india-4472", ok: true },
      { kind: "relay", ascii: "juliet-5830", ok: true }
    ];

    const parseHexByte = value => value.trim().toUpperCase().padStart(2, "0").slice(-2);

    function parseFrames(log) {
      const frames = [];
      const re = /FRAME\s+crc=([0-9a-f]{8})\s+calc=([0-9a-f]{8})\s+ok=([01])\s+size=([0-9a-f]{2})\s+dst=([0-9a-f]{2})\s+src=([0-9a-f]{2})\s+payload=([0-9a-f]*)\s+ascii="([^"]*)"/ig;
      let match;

      while ((match = re.exec(log)) !== null) {
        frames.push({
          crc: match[1].toUpperCase(),
          calc: match[2].toUpperCase(),
          ok: match[3] === "1",
          size: match[4].toUpperCase(),
          dst: match[5].toUpperCase(),
          src: match[6].toUpperCase(),
          payload: match[7].toUpperCase(),
          ascii: match[8]
        });
      }

      return frames;
    }

    function classify(frame, ownAddress) {
      if (frame.src === ownAddress) return "own";
      return "relay";
    }

    function addCheck(container, passed, text, warning = false) {
      const div = document.createElement("div");
      div.className = `check ${passed ? "pass" : warning ? "warn" : "fail"}`;
      div.textContent = `${passed ? "PASS" : warning ? "WARN" : "FAIL"}: ${text}`;
      container.appendChild(div);
    }

    function expectedRelayPayloads() {
      return senderPlan
        .filter(item => item.kind === "relay" || item.kind === "relay-trigger")
        .map(item => item.ascii);
    }

    function renderFrames(frames, ownAddress) {
      const tbody = document.getElementById("frames");
      tbody.textContent = "";

      frames.forEach((frame, index) => {
        const tr = document.createElement("tr");
        const kind = classify(frame, ownAddress);
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${kind}</td>
          <td>${frame.ok ? "ok" : "bad"}<br>${frame.crc}</td>
          <td>${frame.dst}</td>
          <td>${frame.src}</td>
          <td>${frame.ascii}<br>${frame.payload}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function verify() {
      const ownAddress = parseHexByte(document.getElementById("ownAddress").value);
      const senderSource = parseHexByte(document.getElementById("senderSource").value);
      const senderDestination = parseHexByte(document.getElementById("senderDestination").value);
      const expectedRelays = Number(document.getElementById("expectedRelays").value);
      const expectedOwn = Number(document.getElementById("expectedOwn").value);
      const expectedBadCrcRelays = Number(document.getElementById("expectedBadCrcRelays").value);
      const frames = parseFrames(document.getElementById("log").value);
      const relays = frames.filter(frame => classify(frame, ownAddress) === "relay");
      const own = frames.filter(frame => classify(frame, ownAddress) === "own");
      const badCrcRelays = relays.filter(frame => !frame.ok);
      const triggerCount = senderPlan.filter(item => item.kind === "relay-trigger").length;
      const requiredRelays = expectedRelayPayloads();
      const results = document.getElementById("results");

      results.textContent = "";
      renderFrames(frames, ownAddress);

      addCheck(results, frames.length > 0, `parsed ${frames.length} FRAME lines`);
      if (senderSource === ownAddress) {
        addCheck(results, false, "sender source equals DUT address, relay/own classification will be ambiguous", true);
      } else {
        addCheck(results, true, "sender source differs from DUT address");
      }
      addCheck(results, relays.length === expectedRelays, `relayed frame count is ${relays.length}, expected ${expectedRelays}`);
      addCheck(results, own.length === expectedOwn, `own frame count is ${own.length}, expected ${expectedOwn}`);
      addCheck(results, badCrcRelays.length === expectedBadCrcRelays, `bad-CRC relay count is ${badCrcRelays.length}, expected ${expectedBadCrcRelays}`);

      for (const payload of requiredRelays) {
        const found = relays.some(frame => frame.ascii === payload);
        addCheck(results, found, `relay payload present: ${payload}`);
      }

      addCheck(results, relays.filter(frame => frame.ascii === "Send").length === triggerCount, `all ${triggerCount} broadcast Send triggers were relayed`);

      const wrongGoodCrc = relays.filter(frame => !frame.ok);
      addCheck(results, wrongGoodCrc.length === 0, `all normal relays have valid CRC at receiver`);

      addCheck(results, relays.every(frame => frame.dst === senderDestination), `all relayed sender frames use destination ${senderDestination}`);
      addCheck(results, relays.every(frame => frame.src === senderSource), `all relayed sender frames use source ${senderSource}`);
    }

    document.getElementById("verify").addEventListener("click", verify);
  </script>
</body>
</html>
